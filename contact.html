            </div>

            <div class="form-group">
              <label for="subject" class="form-label">件名</label>
              <input type="text" id="subject" name="subject" class="form-control" placeholder="お仕事のご相談について" required>
            </div>

            <div class="form-group">
              <label for="message" class="form-label">メッセージ本文</label>
              <textarea id="message" name="message" class="form-control" placeholder="具体的なご相談内容をご記入ください。"
                required></textarea>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary"
              style="width: 100%; padding: 0.9rem; font-size: 1rem;">メッセージを送信</button>
          </form>
    <!-- Success message container (hidden initially) -->
